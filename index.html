<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System | DV MEDIKA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            width: 100%;
            height: 75px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            width: 180px;
            height: 65px;
            background-color: #00000000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            font-weight: bold;
            border: 0px dashed #ccc;
        }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { text-decoration: none; color: #444; font-size: 13px; font-weight: 500; }

        .viewport {
            margin-top: 75px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.8);
            transform: scale(1.05);
            z-index: 1;
        }

        .overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 45px 35px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #34495e; margin-bottom: 8px; text-transform: uppercase; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { border-color: #28a745; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #218838; transform: translateY(-1px); }
        .btn-submit:disabled { background: #95a5a6; }

        #statusMsg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
        <img src="https://www.dvmedika.com/img/logo/logo.png" alt="DV MEDIKA Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <nav>
            <ul>
                <li><a href="#"></a></li>
                <li><a href="#"></a></li>
                <li><a href="#"></a></li>
            </ul>
        </nav>
    </header>

    <div class="viewport">
        <div class="hero-background"></div>
        <div class="overlay"></div>

        <div class="login-card">
            <h2 style="margin-bottom: 10px; color: #2c3e50;">Masukkan Akun Untuk Mengakses</h2>
            <p style="margin-bottom: 30px; color: #7f8c8d;">Monitoring SOPHI DV Medika</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>ID Puskesmas</label>
                    <input type="text" id="userInput" placeholder="Contoh: Wahid" required>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="passInput" placeholder="ID Puskesmas" required>
                </div>
                
                <button type="submit" class="btn-submit" id="btnAction">MASUK</button>
                <div id="statusMsg"></div>
            </form>
        </div>
    </div>

    <script>
        // Gunakan URL Web App Anda yang baru saja dideploy
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysniOm3381pYhdRKMgvKtTBTwIbdyXbLq6XEi_YK7WTS3xuuG_2zcePpVJO-9CezVW9Q/exec';

        const loginForm = document.getElementById('loginForm');
        const statusMsg = document.getElementById('statusMsg');
        const btnAction = document.getElementById('btnAction');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            statusMsg.style.display = "block";
            statusMsg.style.background = "#f1f2f6";
            statusMsg.style.color = "#2f3542";
            statusMsg.innerHTML = "Memverifikasi...";
            btnAction.disabled = true;

            // 1. CEK DEFAULT ADMIN
            if (user === "Admin" && pass === "superadmindv") {
                handleSuccess("Login Admin Berhasil!");
                return;
            }

            // 2. CEK VIA SPREADSHEET
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ "username": user, "password": pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.result === "success") {
                    handleSuccess("Login Berhasil!");
                } else {
                    handleError("ID atau Password salah.");
                }
            })
            .catch(err => {
                handleError("Gagal terhubung ke database.");
                console.error(err);
            })
            .finally(() => {
                btnAction.disabled = false;
            });
        });

        function handleSuccess(msg) {
            statusMsg.style.background = "#d4edda";
            statusMsg.style.color = "#155724";
            statusMsg.innerHTML = "<strong>" + msg + "</strong><br>Mengalihkan...";
            
            // REDIRECT KE GOOGLE SETELAH 1 DETIK
            setTimeout(() => {
                window.location.href = "https://datastudio.google.com/embed/u/0/reporting/d5ad0950-d00b-4f49-9b4f-f000d7a3fa64/page/64XuF";
            }, 1200);
        }

        function handleError(msg) {
            statusMsg.style.background = "#f8d7da";
            statusMsg.style.color = "#721c24";
            statusMsg.innerHTML = "<strong>Gagal!</strong> " + msg;
        }
    </script>
</body>
</html>
